<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photobooth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

video {
  width: 300px;
  border-radius: 12px;
  border: 3px solid #333;
}

.controls {
  margin-top: 10px;
}

button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #222;
  color: white;
}

button:hover {
  background: #444;
}

.countdown {
  font-size: 48px;
  margin: 10px;
}

.strip {
  margin-top: 20px;
  background: black;
  padding: 10px;
  display: inline-block;
  border-radius: 10px;
}

.strip img {
  display: block;
  width: 220px;
  margin-bottom: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">

<h2>📸 Photobooth</h2>

<select id="filter">
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<div class="countdown" id="countdown"></div>

<div class="controls">
  <button onclick="startCapture()">Capture</button>
  <button onclick="retry()">Ulangi</button>
  <button onclick="downloadStrip()">Download</button>
  <button onclick="downloadZip()">Download ZIP</button>
</div>

<div id="result"></div>

</div>

<script>
let video = document.getElementById("video");
let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];
let retryCount = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// FILTER
function applyFilter() {
  let f = document.getElementById("filter").value;

  if (f === "bw") return "grayscale(1)";
  if (f === "vhs") return "contrast(1.3) saturate(1.5)";
  return "none";
}

// NOISE (VHS effect)
function addNoise(ctx, w, h) {
  let imageData = ctx.getImageData(0, 0, w, h);
  let data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    let rand = (Math.random() - 0.5) * 30;
    data[i] += rand;
    data[i+1] += rand;
    data[i+2] += rand;
  }

  ctx.putImageData(imageData, 0, 0);
}

// COUNTDOWN
function countdown(sec) {
  return new Promise(resolve => {
    let el = document.getElementById("countdown");
    el.innerText = sec;

    let interval = setInterval(() => {
      sec--;
      el.innerText = sec;

      if (sec <= 0) {
        clearInterval(interval);
        el.innerText = "";
        resolve();
      }
    }, 1000);
  });
}

// CAPTURE
async function startCapture() {
  photos = [];

  for (let i = 0; i < 4; i++) {
    await countdown(3);
    takePhoto();
  }

  showResult();
}

function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.filter = applyFilter();
  ctx.drawImage(video, 0, 0);

  if (document.getElementById("filter").value === "vhs") {
    addNoise(ctx, canvas.width, canvas.height);
  }

  photos.push(canvas.toDataURL("image/png"));
}

// SHOW RESULT
function showResult() {
  let div = document.getElementById("result");
  div.innerHTML = "";

  let strip = document.createElement("div");
  strip.className = "strip";

  photos.forEach(p => {
    let img = document.createElement("img");
    img.src = p;
    strip.appendChild(img);
  });

  div.appendChild(strip);
}

// RETRY + ADS
function retry() {
  retryCount++;

  if (retryCount >= 3) {
    alert("🔥 Iklan muncul (simulasi ads)");
    retryCount = 0;
  }

  photos = [];
  document.getElementById("result").innerHTML = "";
}

// DOWNLOAD STRIP
function downloadStrip() {
  let c = document.createElement("canvas");
  let ctx2 = c.getContext("2d");

  let width = 400;
  let height = 400 * photos.length;

  c.width = width;
  c.height = height;

  let loaded = 0;

  photos.forEach((src, i) => {
    let img = new Image();
    img.src = src;

    img.onload = () => {
      ctx2.drawImage(img, 0, i * 400, width, 400);
      loaded++;

      if (loaded === photos.length) {
        let link = document.createElement("a");
        link.download = "photostrip.png";
        link.href = c.toDataURL();
        link.click();
      }
    };
  });
}

// DOWNLOAD ZIP
async function downloadZip() {
  let zip = new JSZip();

  photos.forEach((p, i) => {
    let base64 = p.split(",")[1];
    zip.file(`photo_${i+1}.png`, base64, { base64: true });
  });

  let content = await zip.generateAsync({ type: "blob" });

  let link = document.createElement("a");
  link.href = URL.createObjectURL(content);
  link.download = "photos.zip";
  link.click();
}
</script>

</body>
</html>
