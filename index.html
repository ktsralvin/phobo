<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phobo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

video {
  width: 240px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid #333;
  pointer-events: none;
}

button, select {
  padding: 10px 16px;
  margin: 6px;
  background: transparent;
  color: white;
  cursor: pointer;

  /* sketch style */
  border: 2px solid white;
  border-radius: 0;
  
  /* efek "hand drawn" */
  box-shadow: 
    2px 2px 0 white,
    4px 4px 0 rgba(255,255,255,0.3);

  font-weight: bold;
  letter-spacing: 0.5px;

  transition: 0.15s;
}

button:hover {
  transform: translate(-2px, -2px);
  box-shadow: 
    3px 3px 0 #f8f8ff,
    6px 6px 0 rgba(0,255,204,0.3);
  border-color: #f8f8ff;
  color: #f8f8ff;
}

button:active {
  transform: translate(2px, 2px);
  box-shadow: 
    1px 1px 0 #006400;
}

/* STRIP */
.strip {
  margin-top: 20px;
  padding: 20px 15px;
  display: inline-block;
  border-radius: 12px;
}

.strip img {
  width: 200px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  display: block;
  margin-bottom: 12px;
  border-radius: 6px;
}

/* FLASH */
#flash {
  position: fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

/* PROMO */
#modal {
  position: fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.7);
}

/* FRAME MODAL */
#frameModal {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.frame-box {
  background:#111;
  padding:20px;
  border-radius:16px;
  width:100%;
  max-width:360px;
}

.frame-gif {
  width: 120px;
  margin-top: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
  opacity: 0.9;
  box-shadow: 0 0 20px rgba(0,255,204,0.3);
  display: block;
  margin: 10px auto;
  max-width: 140px;
}

select {
  padding: 10px 35px 10px 12px;
  margin: 5px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #111;
  color: white;
  cursor: pointer;

  /* penting: reset efek sketch */
  box-shadow: none;
  transform: none;

  /* custom arrow */
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;

  background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
}

select:hover {
  border-color: #006400;
  
}

/* GRID */
.frame-options {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:12px;
  margin-top:15px;
}

/* OPTION */
.frame-option {
  cursor:pointer;
}

/* INNER (cuma spacing) */
.frame-inner {
  padding:10px;
}

/* HIGHLIGHT FIX (NEMPEL KE PREVIEW) */
.frame-option.active .frame-preview {
  box-shadow: 0 0 0 4px #006400, 0 0 12px rgba(0,255,204,0.5);
}

/* PREVIEW */
.frame-preview {
  width:100%;
  padding:6px;
  border-radius:10px;
  transition:0.2s;
}

/* SLOT */
.slot {
  width:100%;
  height:40px;
  border-radius:6px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h2>📸 Phobo</h2>

<!-- FRAME MODAL -->
<div id="frameModal">
  <div class="frame-box">
    <h3>Welcome to Phobo</h3>
    <a href="https://www.instagram.com/kautsaralvin" style="color: white; text-decoration: none; font-weight: bold;">About Phobo</a>

    <img src="assets/gif/kamera.png" class="frame-gif">

    <div class="frame-options">

      <div class="frame-option" data-color="white">
        <div class="frame-inner">
          <div class="frame-preview" style="background:white;">
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
          </div>
        </div>
      </div>

      <div class="frame-option" data-color="black">
        <div class="frame-inner">
          <div class="frame-preview" style="background:black;">
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
          </div>
        </div>
      </div>

      <div class="frame-option" data-color="gray">
        <div class="frame-inner">
          <div class="frame-preview" style="background:gray;">
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
          </div>
        </div>
      </div>

    </div>

    <button onclick="confirmFrame()">Select Frame</button>
  </div>
</div>

<select id="filter">
  <option value="none">Select Filter</option>
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay playsinline></video>
<div id="countdown"></div>

<br>

<button id="captureBtn">Capture</button>
<button id="retryBtn">Retry</button>
<button id="downloadBtn">Download</button>
<button id="zipBtn">Cut Photos</button>

<div id="result"></div>

<div id="flash"></div>

<!-- PROMO -->
<div id="modal">
  <div style="background:#111;padding:20px;border-radius:12px;">
    <h2>Promo</h2>
    <p>🔥 Diskon cetak photobooth minggu ini!</p>
    <button onclick="modal.style.display='none'">Tutup</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const filterSelect = document.getElementById("filter");
const captureBtn = document.getElementById("captureBtn");
const retryBtn = document.getElementById("retryBtn");
const downloadBtn = document.getElementById("downloadBtn");
const zipBtn = document.getElementById("zipBtn");
const result = document.getElementById("result");
const flashEl = document.getElementById("flash");
const modal = document.getElementById("modal");
const countdownEl = document.getElementById("countdown");

const frameModal = document.getElementById("frameModal");
const frameOptions = document.querySelectorAll(".frame-option");

let frameColor = "white";
let selectedFrame = null;

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];
let retryCount = 0;

/* INITIAL */
retryBtn.style.display = "none";
downloadBtn.style.display = "none";
zipBtn.style.display = "none";

/* FRAME SELECT */
frameOptions.forEach(el=>{
  el.onclick = ()=>{
    frameOptions.forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
    selectedFrame = el.dataset.color;
  };
});

function confirmFrame(){
  if(!selectedFrame){
    alert("Select frame first!");
    return;
  }
  frameColor = selectedFrame;
  frameModal.style.display = "none";
}

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(s => video.srcObject = s);

/* FILTER PREVIEW */
filterSelect.onchange = ()=>{
  let f = filterSelect.value;
  if(f==="bw") video.style.filter="grayscale(1)";
  else if(f==="vhs") video.style.filter="contrast(1.3) saturate(1.5)";
  else video.style.filter="none";
};

/* APPLY FILTER */
function applyFilter(ctx,w,h){
  let f = filterSelect.value;
  let img = ctx.getImageData(0,0,w,h);
  let d = img.data;

  for(let i=0;i<d.length;i+=4){
    let r=d[i], g=d[i+1], b=d[i+2];

    if(f==="bw"){
      let gray = 0.3*r + 0.59*g + 0.11*b;
      d[i]=d[i+1]=d[i+2]=gray;
    }

    if(f==="vhs"){
      d[i]=r*1.2;
      d[i+1]=g*1.1;
      d[i+2]=b*1.3;
    }
  }

  ctx.putImageData(img,0,0);
}

/* COUNTDOWN */
function runCountdown(sec){
  return new Promise(res=>{
    countdownEl.innerText=sec;
    let i=setInterval(()=>{
      sec--;
      countdownEl.innerText=sec;
      if(sec<=0){
        clearInterval(i);
        countdownEl.innerText="";
        res();
      }
    },1000);
  });
}

/* CAPTURE */
captureBtn.onclick = async ()=>{
  captureBtn.style.display="none";
  photos=[];

  for(let i=0;i<4;i++){
    await runCountdown(3);
    await takePhoto();
  }

  show();

  retryBtn.style.display = "inline-block";
  downloadBtn.style.display = "inline-block";
  zipBtn.style.display = "inline-block";
};

/* FOTO */
function takePhoto(){
  return new Promise(res=>{
    let h = video.videoHeight;
    let w = h * 3 / 4;

    canvas.width = w;
    canvas.height = h;

    let offsetX = (video.videoWidth - w) / 2;

    ctx.drawImage(video, offsetX, 0, w, h, 0, 0, w, h);
    applyFilter(ctx,w,h);

    flash();

    photos.push(canvas.toDataURL());

    setTimeout(res,200);
  });
}

/* FLASH */
function flash(){
  flashEl.style.opacity=1;
  setTimeout(()=>flashEl.style.opacity=0,120);
}

/* SHOW */
function show(){
  result.innerHTML="";
  let div=document.createElement("div");
  div.className="strip";
  div.style.background = frameColor;

  photos.forEach(p=>{
    let img=document.createElement("img");
    img.src=p;
    div.appendChild(img);
  });

  result.appendChild(div);
}

/* RETRY */
retryBtn.onclick = ()=>{
  retryCount++;

  if(retryCount >= 2){
    modal.style.display="flex";
    retryCount = 0;
  }

  photos=[];
  result.innerHTML="";

  captureBtn.style.display="inline-block";
  retryBtn.style.display="none";
  downloadBtn.style.display="none";
  zipBtn.style.display="none";

  frameModal.style.display="flex";
};

/* DOWNLOAD */
downloadBtn.onclick = ()=>{
  let c=document.createElement("canvas");
  let x=c.getContext("2d");

  let photoW=400;
  let photoH=photoW*4/3;

  let padding=30;
  let gap=20;

  let totalH = padding + (photoH*photos.length) + gap*(photos.length-1) + padding;

  c.width = photoW + padding*2;
  c.height = totalH;

  x.fillStyle = frameColor;
  x.fillRect(0,0,c.width,c.height);

  let loaded=0;

  photos.forEach((p,i)=>{
    let img=new Image();
    img.src=p;

    img.onload=()=>{
      let y = padding + i*(photoH+gap);
      x.drawImage(img,padding,y,photoW,photoH);

      loaded++;
      if(loaded===photos.length){
        let a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="photostrip.png";
        a.click();
      }
    }
  });
};

/* CUT PHOTOS */
zipBtn.onclick = async ()=>{
  const zip = new JSZip();

  photos.forEach((p,i)=>{
    let base64 = p.split(',')[1];
    zip.file(`photo_${i+1}.png`, base64, {base64:true});
  });

  const content = await zip.generateAsync({type:"blob"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(content);
  a.download = "photos.zip";
  a.click();
};
</script>

</body>
</html>
