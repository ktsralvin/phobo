<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phobo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

/* VIDEO */
video {
  width: 240px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid #333;
  pointer-events: none;
}

button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

.countdown {
  font-size: 60px;
  font-weight: bold;
}

/* 🔥 FRAME STRIP */
.strip {
  margin-top: 20px;
  background: white;
  padding: 20px 15px;
  display: inline-block;
  border-radius: 12px;
}

/* FOTO */
.strip img {
  width: 200px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  display: block;
  margin-bottom: 12px;
  border-radius: 6px;
}

/* FLASH */
#flash {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:0.2s;
  z-index:999;
}

/* MODAL */
#modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background:#111;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<h2>📸 Photobooth</h2>

<select id="filter">
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<div id="countdown"></div>

<br>

<button id="captureBtn">Capture</button>
<button id="retryBtn">Reset</button>
<button id="downloadBtn">Download</button>
<button id="zipBtn">Cut Photos</button>

<div id="result"></div>

<div id="flash"></div>

<div id="modal">
  <div class="modal-content">
    <h2>Donate Us!</h2>
    <button id="closeModal">Tutup</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const filterSelect = document.getElementById("filter");
const captureBtn = document.getElementById("captureBtn");
const retryBtn = document.getElementById("retryBtn");
const downloadBtn = document.getElementById("downloadBtn");
const zipBtn = document.getElementById("zipBtn");
const result = document.getElementById("result");
const flashEl = document.getElementById("flash");
const modal = document.getElementById("modal");
const closeModalBtn = document.getElementById("closeModal");
const countdownEl = document.getElementById("countdown");

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];
let retryCount = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(s => video.srcObject = s);

// PREVIEW FILTER
filterSelect.addEventListener("change", () => {
  let f = filterSelect.value;
  if(f==="bw") video.style.filter="grayscale(1)";
  else if(f==="vhs") video.style.filter="contrast(1.3) saturate(1.5)";
  else video.style.filter="none";
});

// COUNTDOWN
function runCountdown(sec){
  return new Promise(res=>{
    countdownEl.innerText = sec;
    let i = setInterval(()=>{
      sec--;
      countdownEl.innerText = sec;
      if(sec<=0){
        clearInterval(i);
        countdownEl.innerText="";
        res();
      }
    },1000);
  });
}

// CAPTURE
captureBtn.onclick = async ()=>{
  captureBtn.style.display="none";
  photos=[];

  for(let i=0;i<4;i++){
    await runCountdown(3);
    await takePhoto();
  }

  show();
};

// FOTO PORTRAIT
function takePhoto(){
  return new Promise(res=>{
    let h = video.videoHeight;
    let w = h * 3 / 4;

    canvas.width = w;
    canvas.height = h;

    let offsetX = (video.videoWidth - w) / 2;

    ctx.filter = getFilter();
    ctx.drawImage(video, offsetX, 0, w, h, 0, 0, w, h);

    if(filterSelect.value==="vhs"){
      addNoise(ctx,w,h);
    }

    flash();

    photos.push(canvas.toDataURL());

    setTimeout(res,500);
  });
}

function getFilter(){
  if(filterSelect.value==="bw") return "grayscale(1)";
  if(filterSelect.value==="vhs") return "contrast(1.3) saturate(1.5)";
  return "none";
}

// NOISE
function addNoise(ctx,w,h){
  let img=ctx.getImageData(0,0,w,h);
  let d=img.data;
  for(let i=0;i<d.length;i+=4){
    let n=(Math.random()-0.5)*30;
    d[i]+=n; d[i+1]+=n; d[i+2]+=n;
  }
  ctx.putImageData(img,0,0);
}

// FLASH
function flash(){
  flashEl.style.opacity=1;
  setTimeout(()=>flashEl.style.opacity=0,120);
}

// SHOW
function show(){
  result.innerHTML="";
  let div=document.createElement("div");
  div.className="strip";

  photos.forEach(p=>{
    let img=document.createElement("img");
    img.src=p;
    div.appendChild(img);
  });

  result.appendChild(div);
}

// RETRY
retryBtn.onclick = ()=>{
  retryCount++;
  if(retryCount>=2){
    modal.style.display="flex";
    retryCount=0;
  }
  photos=[];
  result.innerHTML="";
  captureBtn.style.display="inline-block";
};

// 🔥 DOWNLOAD DENGAN FRAME
downloadBtn.onclick = ()=>{
  let c=document.createElement("canvas");
  let x=c.getContext("2d");

  let photoW=400;
  let photoH=photoW*4/3;

  let padding=30;
  let gap=20;

  let totalH = padding + (photoH * photos.length) + (gap * (photos.length-1)) + padding;

  c.width = photoW + padding*2;
  c.height = totalH;

  // background putih
  x.fillStyle="white";
  x.fillRect(0,0,c.width,c.height);

  let loaded=0;

  photos.forEach((p,i)=>{
    let img=new Image();
    img.src=p;

    img.onload=()=>{
      let y = padding + i*(photoH+gap);
      x.drawImage(img, padding, y, photoW, photoH);

      loaded++;
      if(loaded===photos.length){
        let a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="photostrip.png";
        a.click();
      }
    }
  });
};

// ZIP
zipBtn.onclick = async ()=>{
  let zip=new JSZip();
  photos.forEach((p,i)=>{
    zip.file("photo"+(i+1)+".png",p.split(",")[1],{base64:true});
  });

  let blob=await zip.generateAsync({type:"blob"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="photos.zip";
  a.click();
};

closeModalBtn.onclick = ()=> modal.style.display="none";
</script>

</body>
</html>
