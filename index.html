<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phobo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

video {
  width: 240px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid #333;
}

/* BUTTON */
button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

/* STRIP */
.strip {
  margin-top: 20px;
  padding: 20px 15px;
  display: inline-block;
  border-radius: 12px;
}

.strip img {
  width: 200px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  display: block;
  margin-bottom: 12px;
  border-radius: 6px;
}

/* FLASH */
#flash {
  position: fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

/* PROMO */
#modal {
  position: fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.7);
}

/* FRAME MODAL */
#frameModal {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:999;
}

.frame-container {
  width:100%;
  max-width:360px;
  background:#111;
  border-radius:16px;
  padding:20px;
  max-height:90vh;
  overflow-y:auto;
}

/* GRID */
#frameOptions {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:14px;
  margin-top:15px;
}

@media(max-width:480px){
  #frameOptions {
    grid-template-columns: repeat(2,1fr);
  }
}

/* FRAME OPTION */
.frame-option {
  border-radius:16px;
  cursor:pointer;
  transition:0.2s;
}

/* INNER (IMPORTANT FIX) */
.frame-inner {
  padding:10px;
  border-radius:14px;
}

/* HIGHLIGHT FIX */
.frame-option.active {
  box-shadow:
    0 0 0 2px #00ffcc,
    0 0 12px rgba(0,255,204,0.4);
}

.frame-option:hover {
  transform: scale(1.05);
}

/* PREVIEW */
.frame-preview {
  width:100%;
  padding:8px;
  border-radius:10px;
}

/* SLOT */
.slot {
  width:100%;
  height:45px;
  border-radius:6px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h2>📸 Phobo</h2>

<!-- FRAME PICKER -->
<div id="frameModal">
  <div class="frame-container">
    <h3>Pilih Frame</h3>

    <div id="frameOptions">

      <!-- PUTIH -->
      <div class="frame-option" data-color="white">
        <div class="frame-inner">
          <div class="frame-preview" style="background:white;">
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
          </div>
        </div>
      </div>

      <!-- HITAM -->
      <div class="frame-option" data-color="black">
        <div class="frame-inner">
          <div class="frame-preview" style="background:black;">
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
          </div>
        </div>
      </div>

      <!-- ABU -->
      <div class="frame-option" data-color="gray">
        <div class="frame-inner">
          <div class="frame-preview" style="background:gray;">
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
          </div>
        </div>
      </div>

    </div>

    <button onclick="confirmFrame()">Gunakan Frame</button>
  </div>
</div>

<select id="filter">
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay muted playsinline></video>

<div id="countdown"></div>

<br>

<button id="captureBtn">Capture</button>
<button id="retryBtn">Retry</button>
<button id="downloadBtn">Download</button>
<button id="zipBtn">Cut Photos</button>

<div id="result"></div>

<div id="flash"></div>

<div id="modal">
  <div style="background:#111;padding:20px;border-radius:12px;">
    <h2>Promo</h2>
    <button onclick="modal.style.display='none'">Tutup</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const frameOptions = document.querySelectorAll(".frame-option");
const frameModal = document.getElementById("frameModal");

let frameColor = null;
let selectedFrame = null;

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];

// CAMERA FIX
async function startCamera(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:"user" },
      audio:false
    });
    video.srcObject = stream;
    await video.play();
  }catch(e){
    alert("Camera error: " + e.message);
  }
}
startCamera();

// SELECT FRAME
frameOptions.forEach(el=>{
  el.onclick = ()=>{
    frameOptions.forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
    selectedFrame = el.dataset.color;
  };
});

// CONFIRM
function confirmFrame(){
  if(!selectedFrame){
    alert("Pilih frame dulu!");
    return;
  }
  frameColor = selectedFrame;
  frameModal.style.display="none";
}

// CAPTURE
document.getElementById("captureBtn").onclick = async ()=>{
  if(!frameColor) return alert("Pilih frame dulu!");

  photos=[];

  for(let i=0;i<4;i++){
    await new Promise(r=>setTimeout(r,2000));
    takePhoto();
  }

  show();
};

function takePhoto(){
  let h = video.videoHeight;
  let w = h * 3 / 4;

  canvas.width = w;
  canvas.height = h;

  ctx.drawImage(video, (video.videoWidth-w)/2, 0, w, h, 0, 0, w, h);

  photos.push(canvas.toDataURL());
}

// SHOW
function show(){
  let result = document.getElementById("result");
  result.innerHTML="";

  let div=document.createElement("div");
  div.className="strip";
  div.style.background = frameColor;

  photos.forEach(p=>{
    let img=new Image();
    img.src=p;
    div.appendChild(img);
  });

  result.appendChild(div);
}
</script>

</body>
</html>
