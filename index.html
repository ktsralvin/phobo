<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phobo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

video {
  width: 240px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid #333;
  pointer-events: none;
}

button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

/* STRIP */
.strip {
  margin-top: 20px;
  padding: 20px 15px;
  display: inline-block;
  border-radius: 12px;
}

.strip img {
  width: 200px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  display: block;
  margin-bottom: 12px;
  border-radius: 6px;
}

/* FLASH */
#flash {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

/* PROMO */
#modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.7);
}

/* FRAME MODAL */
#frameModal {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.frame-box {
  background:#111;
  padding:20px;
  border-radius:16px;
  width:100%;
  max-width:360px;
}

/* GRID */
.frame-options {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:12px;
  margin-top:15px;
}

@media(max-width:480px){
  .frame-options {
    grid-template-columns: repeat(2,1fr);
  }
}

/* OPTION */
.frame-option {
  border-radius:14px;
  cursor:pointer;
  transition:0.2s;
}

/* INNER */
.frame-inner {
  padding:10px;
  border-radius:12px;
}

/* HIGHLIGHT */
.frame-option.active {
  box-shadow: 0 0 0 2px #00ffcc;
}

/* PREVIEW */
.frame-preview {
  width:100%;
  padding:6px;
  border-radius:10px;
}

/* SLOT */
.slot {
  width:100%;
  height:40px;
  border-radius:6px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h2>📸 Phobo</h2>

<!-- FRAME MODAL -->
<div id="frameModal">
  <div class="frame-box">
    <h3>Select Frame</h3>

    <div class="frame-options">

      <div class="frame-option" data-color="white">
        <div class="frame-inner">
          <div class="frame-preview" style="background:white;">
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
            <div class="slot" style="background:#ddd"></div>
          </div>
        </div>
      </div>

      <div class="frame-option" data-color="black">
        <div class="frame-inner">
          <div class="frame-preview" style="background:black;">
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
            <div class="slot" style="background:#222"></div>
          </div>
        </div>
      </div>

      <div class="frame-option" data-color="gray">
        <div class="frame-inner">
          <div class="frame-preview" style="background:gray;">
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
            <div class="slot" style="background:#bbb"></div>
          </div>
        </div>
      </div>

    </div>

    <button onclick="confirmFrame()">Use Frame</button>
  </div>
</div>

<select id="filter">
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<div id="countdown"></div>

<br>

<button id="captureBtn">Capture</button>
<button id="retryBtn">Retry</button>
<button id="downloadBtn">Download</button>
<button id="zipBtn">Cut Photos</button>

<div id="result"></div>

<div id="flash"></div>

<div id="modal">
  <div style="background:#111;padding:20px;border-radius:12px;">
    <h2>Promo</h2>
    <button onclick="modal.style.display='none'">Tutup</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const filterSelect = document.getElementById("filter");
const captureBtn = document.getElementById("captureBtn");
const retryBtn = document.getElementById("retryBtn");
const downloadBtn = document.getElementById("downloadBtn");
const zipBtn = document.getElementById("zipBtn");
const result = document.getElementById("result");
const flashEl = document.getElementById("flash");
const modal = document.getElementById("modal");
const countdownEl = document.getElementById("countdown");

const frameModal = document.getElementById("frameModal");
const frameOptions = document.querySelectorAll(".frame-option");

let frameColor = "white";
let selectedFrame = null;

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];
let retryCount = 0;

/* FRAME PICKER */
frameOptions.forEach(el=>{
  el.onclick = ()=>{
    frameOptions.forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
    selectedFrame = el.dataset.color;
  };
});

function confirmFrame(){
  if(!selectedFrame){
    alert("Pilih frame dulu!");
    return;
  }
  frameColor = selectedFrame;
  frameModal.style.display = "none";
}

/* CAMERA */
navigator.mediaDevices.getUserMedia({video:true})
.then(s => video.srcObject = s);

/* FILTER */
filterSelect.onchange = ()=>{
  let f = filterSelect.value;
  if(f==="bw") video.style.filter="grayscale(1)";
  else if(f==="vhs") video.style.filter="contrast(1.3) saturate(1.5)";
  else video.style.filter="none";
};

/* APPLY FILTER */
function applyFilter(ctx,w,h){
  let f = filterSelect.value;
  let img = ctx.getImageData(0,0,w,h);
  let d = img.data;

  for(let i=0;i<d.length;i+=4){
    let r=d[i], g=d[i+1], b=d[i+2];

    if(f==="bw"){
      let gray = 0.3*r + 0.59*g + 0.11*b;
      d[i]=d[i+1]=d[i+2]=gray;
    }

    if(f==="vhs"){
      d[i]=r*1.2;
      d[i+1]=g*1.1;
      d[i+2]=b*1.3;
    }
  }

  ctx.putImageData(img,0,0);
}

/* COUNTDOWN */
function runCountdown(sec){
  return new Promise(res=>{
    countdownEl.innerText=sec;
    let i=setInterval(()=>{
      sec--;
      countdownEl.innerText=sec;
      if(sec<=0){
        clearInterval(i);
        countdownEl.innerText="";
        res();
      }
    },1000);
  });
}

/* CAPTURE */
captureBtn.onclick = async ()=>{
  captureBtn.style.display="none";
  photos=[];

  for(let i=0;i<4;i++){
    await runCountdown(3);
    await takePhoto();
  }

  show();
};

/* FOTO */
function takePhoto(){
  return new Promise(res=>{
    let h = video.videoHeight;
    let w = h * 3 / 4;

    canvas.width = w;
    canvas.height = h;

    let offsetX = (video.videoWidth - w) / 2;

    ctx.drawImage(video, offsetX, 0, w, h, 0, 0, w, h);
    applyFilter(ctx,w,h);

    flash();

    photos.push(canvas.toDataURL());

    setTimeout(res,200);
  });
}

/* FLASH */
function flash(){
  flashEl.style.opacity=1;
  setTimeout(()=>flashEl.style.opacity=0,120);
}

/* SHOW */
function show(){
  result.innerHTML="";
  let div=document.createElement("div");
  div.className="strip";
  div.style.background = frameColor;

  photos.forEach(p=>{
    let img=document.createElement("img");
    img.src=p;
    div.appendChild(img);
  });

  result.appendChild(div);
}

/* RETRY */
retryBtn.onclick = ()=>{
  retryCount++;
  if(retryCount>=2){
    modal.style.display="flex";
    retryCount=0;
  }

  photos=[];
  result.innerHTML="";
  captureBtn.style.display="inline-block";

  frameModal.style.display="flex";
};

/* DOWNLOAD */
downloadBtn.onclick = ()=>{
  let c=document.createElement("canvas");
  let x=c.getContext("2d");

  let photoW=400;
  let photoH=photoW*4/3;

  let padding=30;
  let gap=20;

  let totalH = padding + (photoH*photos.length) + gap*(photos.length-1) + padding;

  c.width = photoW + padding*2;
  c.height = totalH;

  x.fillStyle = frameColor;
  x.fillRect(0,0,c.width,c.height);

  let loaded=0;

  photos.forEach((p,i)=>{
    let img=new Image();
    img.src=p;

    img.onload=()=>{
      let y = padding + i*(photoH+gap);
      x.drawImage(img,padding,y,photoW,photoH);

      loaded++;
      if(loaded===photos.length){
        let a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="photostrip.png";
        a.click();
      }
    }
  });
};
</script>

</body>
</html>
