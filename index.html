<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photobooth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

/* ✅ FIX RATIO VIDEO */
video {
  width: 300px;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid #333;
}

.controls {
  margin-top: 10px;
}

button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #222;
  color: white;
}

button:hover {
  background: #444;
}

.countdown {
  font-size: 60px;
  margin: 10px;
  font-weight: bold;
}

.strip {
  margin-top: 20px;
  background: black;
  padding: 10px;
  display: inline-block;
  border-radius: 10px;
}

/* ✅ FIX RATIO HASIL */
.strip img {
  display: block;
  width: 220px;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  margin-bottom: 8px;
  border-radius: 6px;
}

/* FLASH */
#flash {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.2s;
  z-index: 999;
}

/* MODAL */
#modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 1000;
}

.modal-content {
  background:#111;
  padding:20px;
  border-radius:12px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h2>📸 Photobooth</h2>

<select id="filter" onchange="applyPreviewFilter()">
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<div class="countdown" id="countdown"></div>

<div class="controls">
  <button id="captureBtn" onclick="startCapture()">Capture</button>
  <button onclick="retry()">Reset</button>
  <button onclick="downloadStrip()">Download</button>
  <button onclick="downloadZip()">Cut Photos</button>
</div>

<div id="result"></div>

</div>

<!-- FLASH -->
<div id="flash"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-content">
    <h2>Donate Us!</h2>
    <p>Scan QRIS!</p>
    <div style="background:#eee;height:120px;margin:10px;border-radius:8px;"></div>
    <button onclick="closeModal()">Nope!</button>
  </div>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];
let retryCount = 0;

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

// ✅ PREVIEW FILTER (BIAR SAMA DENGAN HASIL)
function applyPreviewFilter() {
  let f = document.getElementById("filter").value;

  if (f === "bw") video.style.filter = "grayscale(1)";
  else if (f === "vhs") video.style.filter = "contrast(1.3) saturate(1.5)";
  else video.style.filter = "none";
}

// FILTER (UNTUK CANVAS)
function applyFilter() {
  let f = document.getElementById("filter").value;

  if (f === "bw") return "grayscale(1)";
  if (f === "vhs") return "contrast(1.3) saturate(1.5)";
  return "none";
}

// VHS NOISE
function addNoise(ctx, w, h) {
  let imageData = ctx.getImageData(0, 0, w, h);
  let data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    let rand = (Math.random() - 0.5) * 30;
    data[i] += rand;
    data[i+1] += rand;
    data[i+2] += rand;
  }

  ctx.putImageData(imageData, 0, 0);
}

// FLASH
function flashEffect() {
  let flash = document.getElementById("flash");
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
  }, 120);
}

// COUNTDOWN
function countdown(sec) {
  return new Promise(resolve => {
    let el = document.getElementById("countdown");
    el.innerText = sec;

    let interval = setInterval(() => {
      sec--;
      el.innerText = sec;

      if (sec <= 0) {
        clearInterval(interval);
        el.innerText = "";
        resolve();
      }
    }, 1000);
  });
}

// CAPTURE
async function startCapture() {
  document.getElementById("captureBtn").style.display = "none";
  photos = [];

  for (let i = 0; i < 4; i++) {
    await countdown(3);
    await takePhoto();
  }

  showResult();
}

// ✅ FIX 4:3 + CROP TENGAH
function takePhoto() {
  return new Promise(resolve => {

    let w = video.videoWidth;
    let h = w * 3 / 4;

    canvas.width = w;
    canvas.height = h;

    let offsetY = (video.videoHeight - h) / 2;

    ctx.filter = applyFilter();
    ctx.drawImage(video, 0, offsetY, w, h, 0, 0, w, h);

    if (document.getElementById("filter").value === "vhs") {
      addNoise(ctx, canvas.width, canvas.height);
    }

    flashEffect();

    photos.push(canvas.toDataURL("image/png"));

    setTimeout(resolve, 500);
  });
}

// SHOW
function showResult() {
  let div = document.getElementById("result");
  div.innerHTML = "";

  let strip = document.createElement("div");
  strip.className = "strip";

  photos.forEach(p => {
    let img = document.createElement("img");
    img.src = p;
    strip.appendChild(img);
  });

  div.appendChild(strip);
}

// RETRY
function retry() {
  retryCount++;

  if (retryCount >= 2) {
    openModal();
    retryCount = 0;
  }

  photos = [];
  document.getElementById("result").innerHTML = "";
  document.getElementById("captureBtn").style.display = "inline-block";
}

// ✅ DOWNLOAD STRIP FIX RATIO
function downloadStrip() {
  let c = document.createElement("canvas");
  let ctx2 = c.getContext("2d");

  let width = 400;
  let h = width * 3 / 4;

  c.width = width;
  c.height = h * photos.length;

  let loaded = 0;

  photos.forEach((src, i) => {
    let img = new Image();
    img.src = src;

    img.onload = () => {
      ctx2.drawImage(img, 0, i * h, width, h);
      loaded++;

      if (loaded === photos.length) {
        let link = document.createElement("a");
        link.download = "photostrip.png";
        link.href = c.toDataURL();
        link.click();
      }
    };
  });
}

// ZIP
async function downloadZip() {
  let zip = new JSZip();

  photos.forEach((p, i) => {
    let base64 = p.split(",")[1];
    zip.file(`photo_${i+1}.png`, base64, { base64: true });
  });

  let content = await zip.generateAsync({ type: "blob" });

  let link = document.createElement("a");
  link.href = URL.createObjectURL(content);
  link.download = "photos.zip";
  link.click();
}

// MODAL
function openModal() {
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

// INIT
applyPreviewFilter();
</script>

</body>
</html>
