<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phobo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

video {
  width: 240px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  border-radius: 12px;
  border: 3px solid #333;
  pointer-events: none;
}

button, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

/* STRIP */
.strip {
  margin-top: 20px;
  padding: 20px 15px;
  display: inline-block;
  border-radius: 12px;
}

.strip img {
  width: 200px;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  display: block;
  margin-bottom: 12px;
  border-radius: 6px;
}

#flash {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  opacity:0;
  pointer-events:none;
  transition:0.2s;
}

#modal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  background: rgba(0,0,0,0.7);
}

/* FRAME MODAL */
#frameModal {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
  box-sizing:border-box;
}

.frame-container {
  background:#111;
  padding:20px;
  border-radius:16px;
  width:100%;
  max-width:400px;
  max-height:90vh;
  overflow-y:auto;
}

/* GRID */
#frameOptions {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
  margin-top:15px;
}

/* MOBILE */
@media (max-width:480px){
  #frameOptions {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* FRAME OPTION */
.frame-option {
  padding:10px;
  border-radius:14px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
  -webkit-tap-highlight-color: transparent;
}

.frame-option:hover {
  transform: scale(1.05);
}

.frame-option.active {
  border:2px solid #00ffcc;
}

/* PREVIEW */
.frame-preview {
  width:100%;
  padding:10px 8px;
  border-radius:10px;
}

.slot {
  width:100%;
  height:50px;
  border-radius:6px;
  margin-bottom:6px;
}

/* BUTTON MOBILE */
.frame-container button {
  width:100%;
  margin-top:15px;
  padding:12px;
  font-size:16px;
}
</style>
</head>

<body>

<h2>📸 Phobo</h2>

<!-- FRAME PICKER -->
<div id="frameModal">
  <div class="frame-container">
    <h2 style="margin-top:0;">Choose Frame</h2>

    <div id="frameOptions">

      <!-- PUTIH -->
      <div class="frame-option" data-color="white">
        <div class="frame-preview" style="background:white;">
          <div class="slot" style="background:#ddd;"></div>
          <div class="slot" style="background:#ddd;"></div>
          <div class="slot" style="background:#ddd;"></div>
          <div class="slot" style="background:#ddd;"></div>
        </div>
      </div>

      <!-- HITAM -->
      <div class="frame-option" data-color="black">
        <div class="frame-preview" style="background:black;">
          <div class="slot" style="background:#222;"></div>
          <div class="slot" style="background:#222;"></div>
          <div class="slot" style="background:#222;"></div>
          <div class="slot" style="background:#222;"></div>
        </div>
      </div>

      <!-- ABU -->
      <div class="frame-option" data-color="gray">
        <div class="frame-preview" style="background:gray;">
          <div class="slot" style="background:#bbb;"></div>
          <div class="slot" style="background:#bbb;"></div>
          <div class="slot" style="background:#bbb;"></div>
          <div class="slot" style="background:#bbb;"></div>
        </div>
      </div>

    </div>

    <button onclick="confirmFrame()">Use Frame</button>
  </div>
</div>

<select id="filter">
  <option value="none">Normal</option>
  <option value="bw">Black & White</option>
  <option value="vhs">VHS Vintage</option>
</select>

<br>

<video id="video" autoplay playsinline></video>

<div id="countdown"></div>

<br>

<button id="captureBtn">Capture</button>
<button id="retryBtn">Retry</button>
<button id="downloadBtn">Download</button>
<button id="zipBtn">Cut Photos</button>

<div id="result"></div>

<div id="flash"></div>

<div id="modal">
  <div style="background:#111;padding:20px;border-radius:12px;">
    <h2>Promo</h2>
    <button onclick="modal.style.display='none'">Tutup</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const filterSelect = document.getElementById("filter");
const captureBtn = document.getElementById("captureBtn");
const retryBtn = document.getElementById("retryBtn");
const downloadBtn = document.getElementById("downloadBtn");
const zipBtn = document.getElementById("zipBtn");
const result = document.getElementById("result");
const flashEl = document.getElementById("flash");
const modal = document.getElementById("modal");
const countdownEl = document.getElementById("countdown");

const frameModal = document.getElementById("frameModal");
const frameOptions = document.querySelectorAll(".frame-option");

let frameColor = null;
let selectedFrame = null;

let canvas = document.createElement("canvas");
let ctx = canvas.getContext("2d");

let photos = [];
let retryCount = 0;

// PILIH FRAME
frameOptions.forEach(el=>{
  el.onclick = ()=>{
    frameOptions.forEach(e=>e.classList.remove("active"));
    el.classList.add("active");
    selectedFrame = el.dataset.color;
  };
});

// CONFIRM FRAME
function confirmFrame(){
  if(!selectedFrame){
    alert("Pilih frame dulu!");
    return;
  }
  frameColor = selectedFrame;
  frameModal.style.display = "none";
}

// LOAD
window.onload = ()=>{
  frameModal.style.display = "flex";
};

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(s => video.srcObject = s);

// FILTER PREVIEW
filterSelect.onchange = ()=>{
  let f = filterSelect.value;
  if(f==="bw") video.style.filter="grayscale(1)";
  else if(f==="vhs") video.style.filter="contrast(1.3) saturate(1.5)";
  else video.style.filter="none";
};

// FILTER APPLY
function applyFilter(ctx,w,h){
  let f = filterSelect.value;
  let img = ctx.getImageData(0,0,w,h);
  let d = img.data;

  for(let i=0;i<d.length;i+=4){
    let r=d[i], g=d[i+1], b=d[i+2];

    if(f==="bw"){
      let gray = 0.3*r + 0.59*g + 0.11*b;
      d[i]=d[i+1]=d[i+2]=gray;
    }

    if(f==="vhs"){
      d[i]=r*1.2;
      d[i+1]=g*1.1;
      d[i+2]=b*1.3;

      let n=(Math.random()-0.5)*40;
      d[i]+=n; d[i+1]+=n; d[i+2]+=n;
    }
  }

  ctx.putImageData(img,0,0);
}

// COUNTDOWN
function runCountdown(sec){
  return new Promise(res=>{
    countdownEl.innerText=sec;
    let i=setInterval(()=>{
      sec--;
      countdownEl.innerText=sec;
      if(sec<=0){
        clearInterval(i);
        countdownEl.innerText="";
        res();
      }
    },1000);
  });
}

// CAPTURE
captureBtn.onclick = async ()=>{
  if(!frameColor){
    alert("Pilih frame dulu!");
    return;
  }

  captureBtn.style.display="none";
  photos=[];

  for(let i=0;i<4;i++){
    await runCountdown(3);
    await takePhoto();
  }

  show();
};

// FOTO
function takePhoto(){
  return new Promise(res=>{
    let h = video.videoHeight;
    let w = h * 3 / 4;

    canvas.width = w;
    canvas.height = h;

    let offsetX = (video.videoWidth - w) / 2;

    ctx.drawImage(video, offsetX, 0, w, h, 0, 0, w, h);

    applyFilter(ctx,w,h);

    flash();

    photos.push(canvas.toDataURL());

    setTimeout(res,200);
  });
}

// FLASH
function flash(){
  flashEl.style.opacity=1;
  setTimeout(()=>flashEl.style.opacity=0,120);
}

// SHOW
function show(){
  result.innerHTML="";
  let div=document.createElement("div");
  div.className="strip";
  div.style.background = frameColor;

  photos.forEach(p=>{
    let img=document.createElement("img");
    img.src=p;
    div.appendChild(img);
  });

  result.appendChild(div);
}

// RETRY
retryBtn.onclick = ()=>{
  retryCount++;

  if(retryCount>=2){
    modal.style.display="flex";
    retryCount=0;
  }

  photos=[];
  result.innerHTML="";
  captureBtn.style.display="inline-block";

  frameColor = null;
  selectedFrame = null;
  frameOptions.forEach(e=>e.classList.remove("active"));

  frameModal.style.display="flex";
};

// DOWNLOAD
downloadBtn.onclick = ()=>{
  let c=document.createElement("canvas");
  let x=c.getContext("2d");

  let photoW=400;
  let photoH=photoW*4/3;

  let padding=30;
  let gap=20;

  let totalH = padding + (photoH*photos.length) + gap*(photos.length-1) + padding;

  c.width = photoW + padding*2;
  c.height = totalH;

  x.fillStyle = frameColor || "white";
  x.fillRect(0,0,c.width,c.height);

  let loaded=0;

  photos.forEach((p,i)=>{
    let img=new Image();
    img.src=p;

    img.onload=()=>{
      let y = padding + i*(photoH+gap);
      x.drawImage(img,padding,y,photoW,photoH);

      loaded++;
      if(loaded===photos.length){
        let a=document.createElement("a");
        a.href=c.toDataURL();
        a.download="photostrip.png";
        a.click();
      }
    }
  });
};

// ZIP
zipBtn.onclick = async ()=>{
  let zip=new JSZip();

  photos.forEach((p,i)=>{
    zip.file("photo"+(i+1)+".png",p.split(",")[1],{base64:true});
  });

  let blob=await zip.generateAsync({type:"blob"});

  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="photos.zip";
  a.click();
};
</script>

</body>
</html>
